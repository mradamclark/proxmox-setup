---
# Proxmox-specific configuration: packages, network tunables, NIC fixes,
# and system tuning. Safe to re-run.

- name: Install Proxmox-specific packages
  tags: ["proxmox", "packages"]
  ansible.builtin.apt:
    name: "{{ proxmox_packages }}"
    state: present
    update_cache: true

- name: Configure Proxmox network settings
  tags: ["proxmox", "network"]
  block:
    - name: Enable IPv4 forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        state: present
        reload: true

    - name: Enable IPv6 forwarding
      ansible.posix.sysctl:
        name: net.ipv6.conf.all.forwarding
        value: '1'
        state: present
        reload: true

# Intel I219 (and other e1000e) NICs have a long-standing "hardware unit
# hang" bug that hits Proxmox nodes especially hard — the NIC drops off
# the bus under load and takes the host's management network with it.
# Disabling TSO/GSO/GRO + EEE sidesteps it. We persist the fix in
# /etc/network/interfaces so it survives reboots.
#
# Harmless no-op on hosts without e1000e NICs.
- name: Fix Intel e1000e NIC hardware hang bug
  tags: ["proxmox", "network"]
  block:
    - name: Detect e1000e NICs
      ansible.builtin.shell:
        cmd: |
          for nic in $(ls /sys/class/net/); do
            driver_link="/sys/class/net/${nic}/device/driver"
            [ -L "${driver_link}" ] || continue
            driver=$(basename $(readlink -f "${driver_link}"))
            [ "${driver}" = "e1000e" ] && echo "${nic}"
          done
      register: e1000e_nics
      changed_when: false
      failed_when: false

    - name: Disable TSO/GSO/GRO on e1000e NICs
      when: e1000e_nics.stdout_lines | length > 0
      ansible.builtin.command:
        cmd: "ethtool -K {{ item }} tso off gso off gro off"
      loop: "{{ e1000e_nics.stdout_lines }}"
      changed_when: false

    - name: Disable Energy Efficient Ethernet on e1000e NICs
      when: e1000e_nics.stdout_lines | length > 0
      ansible.builtin.command:
        cmd: "ethtool --set-eee {{ item }} eee off"
      loop: "{{ e1000e_nics.stdout_lines }}"
      changed_when: false

    - name: Persist e1000e NIC workaround in /etc/network/interfaces
      when: e1000e_nics.stdout_lines | length > 0
      ansible.builtin.blockinfile:
        path: /etc/network/interfaces
        marker: "# {mark} ANSIBLE MANAGED - e1000e hardware hang workaround for {{ item }}"
        insertafter: "^iface {{ item }} inet"
        block: |
            post-up /sbin/ethtool -K {{ item }} tso off gso off gro off
            post-up /sbin/ethtool --set-eee {{ item }} eee off
      loop: "{{ e1000e_nics.stdout_lines }}"

    - name: Display e1000e fix status
      ansible.builtin.debug:
        msg: >-
          {% if e1000e_nics.stdout_lines | length > 0 %}
          Applied e1000e hardware hang workaround on: {{ e1000e_nics.stdout_lines | join(', ') }}
          {% else %}
          No e1000e NICs detected - skipping workaround
          {% endif %}

- name: Configure system tuning
  tags: ["proxmox", "tuning"]
  block:
    - name: Lower swappiness (prefer RAM over swap for VM workloads)
      ansible.posix.sysctl:
        name: vm.swappiness
        value: '10'
        state: present
        reload: true

    - name: Increase inotify watch limit
      ansible.posix.sysctl:
        name: fs.inotify.max_user_watches
        value: '524288'
        state: present
        reload: true
